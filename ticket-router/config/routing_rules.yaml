# Ticket Router Configuration
# Claude reads each ticket and decides who to assign based on team expertise.

project_context: |
  GROHE NEO is a full-stack headless e-commerce + content platform for GROHE (bathroom/kitchen fixtures).
  Tech stack: Sitecore XM Cloud (CMS), .NET 8 microservices on Google Cloud Run, Next.js frontend on Vercel,
  Python data-loader (ETL), Google Firestore, Hybris (SAP Commerce) for cart/orders/payments.
  The platform serves 30+ international markets with localized content.

